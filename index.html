<!DOCTYPE html>
<html>
<head>
    <title>My Slogan for "Online Safety"</title>
    <meta charset="UTF-8">
    <style>

        body {
            display: flex;
            justify-content: center; align-items: center;
            height: 100vh; weight: 100vw;
            margin: 0;
            background: linear-gradient(180deg, #07090f, #420a0a);
            background-size: 100% 100%;
            font-size: 30px;
            overflow: hidden;
        }

        .small, .text3 {position: absolute; text-align: center;}

        .small {
            font-family: 'DejaVu Serif', 'Noto Serif', Garamond, Georgia, 'Times New Roman', serif;
            color: #fff;
            text-shadow: 4px 4px 8px #000;
            z-index: 2;
        }

        .text2 {margin-top: 3rem;}

        .text3 {
            font-family: 'DejaVu Sans', 'Noto Sans', Helvetica, sans-serif;
            font-size: 50vw;
            font-weight: 700;
            letter-spacing: -5rem;
            color: #0000;
            -webkit-text-stroke: 2px #b7b7b7;
            z-index: 1;
        }

    </style>
</head>

<body>

    <!--
        Being smart and savvy pays off, because the biggest threat in your system is you.
    -->
    <div class="small">
        <div class="text1">Being smart and savvy pays off</div>
        <div class="text2">The biggest threat to your system is</div>
    </div>
    <div class="text3">YOU</div>

</body>

</html>
